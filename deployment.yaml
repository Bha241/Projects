apiVersion: apps/v1
kind: Deployment
metadata:
  name: education-analytics-deployment
  labels:
    app: education-analytics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: education-analytics
  template:
    metadata:
      labels:
        app: education-analytics
    spec:
      containers:
      - name: education-analytics-container
        image: education-analytics:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: api-port
        env:
        - name: PYTHONPATH
          value: "/app"
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
